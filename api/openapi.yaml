components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `POST /auth/login` (defined in a later sub-step).
        The token's signing key and TTL come from `JWT_SECRET` / `JWT_TTL`
        in the shared `.env` file.

  parameters:
    Page:
      name: page
      in: query
      description: 1-indexed page number.
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: per_page
      in: query
      description: Page size.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

    Search:
      name: search
      in: query
      description: Case-insensitive substring match across the resource's searchable columns.
      schema:
        type: string

    Sort:
      name: sort
      in: query
      description: Column to sort by. Prefix with `-` for descending (e.g. `-created_at`).
      schema:
        type: string

    PatientId:
      name: id
      in: path
      required: true
      description: Patient ID.
      schema:
        type: integer
        format: int64
        minimum: 1

    AppointmentId:
      name: id
      in: path
      required: true
      description: Appointment ID.
      schema:
        type: integer
        format: int64
        minimum: 1

    InvoiceId:
      name: id
      in: path
      required: true
      description: Invoice ID.
      schema:
        type: integer
        format: int64
        minimum: 1

    CategoryId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }

    TreatmentId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }

    VisitTreatmentId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }

    UserId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }

    MedicalHistoryId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64, minimum: 1 }

    ClinicalRecordId:
      name: id
      in: path
      required: true
      description: Polymorphic clinical-record id — shared by cephalometric_analyses, diagnostic_assets, mechanotherapy_visits, tooth_measurements, orthodontics_medical_histories.
      schema: { type: integer, format: int64, minimum: 1 }

  schemas:

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: User's email address. Named `username` to match Laravel's login input.
          example: doctor@example.com
        password:
          type: string
          format: password
          minLength: 1

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
          description: "Signed JWT (HS256). Use as `Authorization: Bearer <token>`."
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds remaining until the token expires.
        user:
          $ref: '#/components/schemas/AuthUser'

    AuthUser:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email

    Patient:
      type: object
      required:
        - id
        - first_name
        - last_name
        - full_name
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        full_name:
          type: string
          description: Computed accessor — `first_name` + " " + `last_name`. Read-only.
          readOnly: true
        date_of_birth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [Male, Female, Other]
          nullable: true
        phone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          maxLength: 100
          nullable: true
        address:
          type: string
          maxLength: 255
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    PatientCreate:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
          enum: [Male, Female, Other]
        phone:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 100
        address:
          type: string
          maxLength: 255

    PatientUpdate:
      type: object
      description: |
        All fields are optional. Only keys present in the request body
        are written; explicit `null` clears a nullable column.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        date_of_birth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [Male, Female, Other]
          nullable: true
        phone:
          type: string
          maxLength: 20
          nullable: true
        email:
          type: string
          format: email
          maxLength: 100
          nullable: true
        address:
          type: string
          maxLength: 255
          nullable: true

    PatientEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Patient'

    AppointmentPatient:
      type: object
      description: Minimal patient embed used inside appointment responses.
      required: [id, full_name]
      properties:
        id:
          type: integer
          format: int64
        full_name:
          type: string

    AppointmentUser:
      type: object
      description: Minimal user embed used inside appointment responses.
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email

    Appointment:
      type: object
      required:
        - id
        - patient_id
        - user_id
        - appointment_date_time
        - duration_minutes
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        patient_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        appointment_date_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          minimum: 1
        reason_for_visit:
          type: string
          nullable: true
        status:
          type: string
          enum: [Scheduled, Confirmed, Completed, Cancelled]
        patient:
          $ref: '#/components/schemas/AppointmentPatient'
        user:
          $ref: '#/components/schemas/AppointmentUser'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    AppointmentCreate:
      type: object
      required: [patient_id, user_id, appointment_date_time]
      properties:
        patient_id:
          type: integer
          format: int64
          minimum: 1
        user_id:
          type: integer
          format: int64
          minimum: 1
        appointment_date_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 600
          default: 30
        reason_for_visit:
          type: string
        status:
          type: string
          enum: [Scheduled, Confirmed, Completed, Cancelled]
          default: Scheduled

    AppointmentUpdate:
      type: object
      description: |
        Partial merge — only present fields are written. Same nullable
        caveat as PatientUpdate.
      properties:
        patient_id:
          type: integer
          format: int64
          minimum: 1
        user_id:
          type: integer
          format: int64
          minimum: 1
        appointment_date_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          minimum: 1
          maximum: 600
        reason_for_visit:
          type: string
          nullable: true
        status:
          type: string
          enum: [Scheduled, Confirmed, Completed, Cancelled]

    AppointmentEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Appointment'

    PaginatedAppointments:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    InvoiceAppointment:
      type: object
      description: Minimal appointment embed used inside invoice responses.
      required: [id, appointment_date_time]
      properties:
        id:
          type: integer
          format: int64
        appointment_date_time:
          type: string
          format: date-time
        patient:
          $ref: '#/components/schemas/AppointmentPatient'

    Invoice:
      type: object
      required:
        - id
        - appointment_id
        - invoice_date
        - total_amount
        - amount_paid
        - payment_status
        - remaining_balance
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        appointment_id:
          type: integer
          format: int64
        invoice_date:
          type: string
          format: date
        total_amount:
          type: string
          description: "Decimal as string with 2-fraction precision. Matches Laravel's `decimal:2` cast."
          example: "1500.00"
        amount_paid:
          type: string
          description: Decimal as string with 2-fraction precision.
          example: "500.00"
        remaining_balance:
          type: string
          description: Computed accessor — `total_amount` − `amount_paid`. Read-only.
          readOnly: true
          example: "1000.00"
        payment_status:
          type: string
          enum: [Pending, Paid, Partial]
        appointment:
          $ref: '#/components/schemas/InvoiceAppointment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    InvoiceCreate:
      type: object
      required: [appointment_id, invoice_date, total_amount]
      properties:
        appointment_id:
          type: integer
          format: int64
          minimum: 1
        invoice_date:
          type: string
          format: date
        total_amount:
          type: string
          description: Decimal as string, up to 2 fraction digits. Must be ≥ 0.
        amount_paid:
          type: string
          description: Decimal as string. Must be 0 ≤ amount_paid ≤ total_amount.
          default: "0.00"
        payment_status:
          type: string
          enum: [Pending, Paid, Partial]
          default: Pending

    InvoiceUpdate:
      type: object
      description: |
        Partial merge — only present fields are written. Same nullable
        caveat as PatientUpdate / AppointmentUpdate.
      properties:
        invoice_date:
          type: string
          format: date
        total_amount:
          type: string
        amount_paid:
          type: string
        payment_status:
          type: string
          enum: [Pending, Paid, Partial]

    InvoiceEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Invoice'

    PaginatedInvoices:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    Category:
      type: object
      required: [id, parent_id, name, slug, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        parent_id: { type: integer, format: int64 }
        name: { type: string, maxLength: 255 }
        slug: { type: string, maxLength: 255 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time, nullable: true }
    CategoryCreate:
      type: object
      required: [name]
      properties:
        parent_id: { type: integer, format: int64, minimum: 0, default: 0 }
        name: { type: string, minLength: 1, maxLength: 255 }
        slug: { type: string, maxLength: 255 }
    CategoryUpdate:
      type: object
      properties:
        parent_id: { type: integer, format: int64, minimum: 0 }
        name: { type: string, minLength: 1, maxLength: 255 }
        slug: { type: string, maxLength: 255 }
    CategoryEnvelope:
      type: object
      required: [data]
      properties: { data: { $ref: '#/components/schemas/Category' } }
    PaginatedCategories:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Category' } }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    Treatment:
      type: object

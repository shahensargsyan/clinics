  /medical-history:
    get:
      operationId: listMedicalHistory
      tags: [MedicalHistory]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: patient_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedMedicalHistory' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createMedicalHistory
      tags: [MedicalHistory]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MedicalHistoryCreate' } } }
      responses:
        '201':
          description: created
          content: { application/json: { schema: { $ref: '#/components/schemas/MedicalHistoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /medical-history/{id}:
    parameters: [ { $ref: '#/components/parameters/MedicalHistoryId' } ]
    get:
      operationId: getMedicalHistory
      tags: [MedicalHistory]
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/MedicalHistoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateMedicalHistory
      tags: [MedicalHistory]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MedicalHistoryUpdate' } } }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/MedicalHistoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:

      operationId: listCephalometricAnalyses
      tags: [Clinical]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Sort'
        - name: patient_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:

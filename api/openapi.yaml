openapi: 3.0.3

info:
  title: Clinics API
  version: 0.1.0
  description: |
    Go (Gin + GORM) backend replacing the Laravel/Backpack admin for the
    clinics project. This document is the single source of truth for the
    HTTP contract; `oapi-codegen` consumes it to produce the server
    interface implemented in `internal/api/`.

    ## Conventions
    - **Pagination.** Use `page` (1-indexed) and `per_page`. Responses
      always include a `meta` object: `current_page`, `per_page`, `total`,
      `last_page`.
    - **Search.** A single `search` query parameter performs a
      case-insensitive substring match across each resource's documented
      searchable columns (see the endpoint description).
    - **Sort.** `sort=column` for ascending, `sort=-column` for descending.
    - **Update semantics.** `PUT` accepts a **partial** body — only the
      keys present are updated. This intentionally mirrors the existing
      Backpack admin behaviour rather than strict REST replace semantics.
    - **Errors.** 422 responses follow Laravel's shape
      (`{ message, errors: { field: [msg, ...] } }`) so the existing
      frontend's validation-display code keeps working.

servers:
  - url: http://localhost:8080
    description: Local development.

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and session issuance.
  - name: Patients
    description: Patient demographic records.
  - name: Appointments
    description: Scheduling, status transitions, and per-visit metadata.
  - name: Invoices
    description: Per-appointment billing records.
  - name: Categories
    description: Tree of treatment categories.
  - name: Treatments
    description: Catalog of services with standard costs.
  - name: VisitTreatments
    description: Per-tooth treatment records linking an appointment to a treatment.
  - name: Users
    description: Admin/clinician accounts.
  - name: MedicalHistory
    description: General patient medical history entries.
  - name: Clinical
    description: Orthodontic clinical record sub-types (diagnostic, biometric, visit).

paths:

  /auth/login:
    post:
      operationId: loginUser
      tags: [Auth]
      summary: Authenticate and receive a JWT.
      description: |
        Mirrors Laravel's `Auth::guard('api')->attempt([username, password])`
        flow: the `username` field is the user's email address (named so for
        wire compatibility with the existing frontend's login form).
      security: []   # Public endpoint — bearer token is what this issues.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /patients:
    get:
      operationId: listPatients
      tags: [Patients]
      summary: List patients with pagination, search, and sort.
      description: |
        `search` matches against `first_name`, `last_name`, `email`, and
        `phone` (case-insensitive LIKE).

        Sortable columns: `id`, `first_name`, `last_name`, `date_of_birth`,
        `email`, `created_at`, `updated_at`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated patient list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPatients'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: createPatient
      tags: [Patients]
      summary: Create a new patient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Patient created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /patients/{id}:
    parameters:
      - $ref: '#/components/parameters/PatientId'

    get:
      operationId: getPatient
      tags: [Patients]
      summary: Fetch a single patient by id.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: updatePatient
      tags: [Patients]
      summary: Update a patient (partial merge).
      description: |
        Only fields present in the request body are updated. Omit a key to
        leave its value unchanged. Explicit `null` clears the field (where
        the column is nullable).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdate'
      responses:
        '200':
          description: Patient updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      operationId: deletePatient
      tags: [Patients]
      summary: Soft-delete a patient.
      description: |
        Sets `deleted_at`; the row is preserved and excluded from default
        queries via GORM's soft-delete handling.
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /appointments:
    get:
      operationId: listAppointments
      tags: [Appointments]
      summary: List appointments with pagination, search, sort, and filters.
      description: |
        `search` matches against `reason_for_visit` (case-insensitive LIKE).

        Sortable columns: `id`, `appointment_date_time`, `duration_minutes`,
        `status`, `created_at`, `updated_at`.

        All filter params (`status`, `patient_id`, `user_id`) are
        combinable (AND).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: status
          in: query
          schema:
            type: string
            enum: [Scheduled, Confirmed, Completed, Cancelled]
        - name: patient_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: user_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Paginated appointment list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointments'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: createAppointment
      tags: [Appointments]
      summary: Create a new appointment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
      responses:
        '201':
          description: Appointment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /appointments/{id}:
    parameters:
      - $ref: '#/components/parameters/AppointmentId'

    get:
      operationId: getAppointment
      tags: [Appointments]
      summary: Fetch a single appointment by id.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: updateAppointment
      tags: [Appointments]
      summary: Update an appointment (partial merge).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdate'
      responses:
        '200':
          description: Appointment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      operationId: deleteAppointment
      tags: [Appointments]
      summary: Soft-delete an appointment.
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /invoices:
    get:
      operationId: listInvoices
      tags: [Invoices]
      summary: List invoices with pagination, sort, and filters.
      description: |
        Sortable columns: `id`, `invoice_date`, `total_amount`,
        `amount_paid`, `payment_status`, `created_at`, `updated_at`.

        Filters (combinable, AND): `payment_status`, `appointment_id`.

        The `search` parameter is accepted for API uniformity but is a
        no-op for invoices — there are no free-text columns worth
        searching.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: payment_status
          in: query
          schema:
            type: string
            enum: [Pending, Paid, Partial]
        - name: appointment_id
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Paginated invoice list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInvoices'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      operationId: createInvoice
      tags: [Invoices]
      summary: Create a new invoice.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        '201':
          description: Invoice created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /invoices/{id}:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'

    get:
      operationId: getInvoice
      tags: [Invoices]
      summary: Fetch a single invoice by id.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      operationId: updateInvoice
      tags: [Invoices]
      summary: Update an invoice (partial merge).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceUpdate'
      responses:
        '200':
          description: Invoice updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      operationId: deleteInvoice
      tags: [Invoices]
      summary: Soft-delete an invoice.
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: List categories with pagination/search/sort.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: parent_id
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedCategories' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createCategory
      tags: [Categories]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CategoryCreate' } } }
      responses:
        '201':
          description: created
          content: { application/json: { schema: { $ref: '#/components/schemas/CategoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /categories/{id}:
    parameters: [ { $ref: '#/components/parameters/CategoryId' } ]
    get:
      operationId: getCategory
      tags: [Categories]
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/CategoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateCategory
      tags: [Categories]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CategoryUpdate' } } }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/CategoryEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteCategory
      tags: [Categories]
      responses:
        '204': { description: deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /treatments:
    get:
      operationId: listTreatments
      tags: [Treatments]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: category_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedTreatments' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createTreatment
      tags: [Treatments]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TreatmentCreate' } } }
      responses:
        '201':
          description: created
          content: { application/json: { schema: { $ref: '#/components/schemas/TreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /treatments/{id}:
    parameters: [ { $ref: '#/components/parameters/TreatmentId' } ]
    get:
      operationId: getTreatment
      tags: [Treatments]
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/TreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateTreatment
      tags: [Treatments]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TreatmentUpdate' } } }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/TreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteTreatment
      tags: [Treatments]
      responses:
        '204': { description: deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /visit-treatments:
    get:
      operationId: listVisitTreatments
      tags: [VisitTreatments]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
        - name: appointment_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
        - name: treatment_id
          in: query
          schema: { type: integer, format: int64, minimum: 1 }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedVisitTreatments' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createVisitTreatment
      tags: [VisitTreatments]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VisitTreatmentCreate' } } }
      responses:
        '201':
          description: created
          content: { application/json: { schema: { $ref: '#/components/schemas/VisitTreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /visit-treatments/{id}:
    parameters: [ { $ref: '#/components/parameters/VisitTreatmentId' } ]
    get:
      operationId: getVisitTreatment
      tags: [VisitTreatments]
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/VisitTreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateVisitTreatment
      tags: [VisitTreatments]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VisitTreatmentUpdate' } } }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/VisitTreatmentEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      operationId: deleteVisitTreatment
      tags: [VisitTreatments]
      responses:
        '204': { description: deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users:
    get:
      operationId: listUsers
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedUsers' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UserCreate' } } }
      responses:
        '201':
          description: created
          content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/UserId' } ]
    get:
      operationId: getUser
      tags: [Users]
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateUser
      tags: [Users]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UserUpdate' } } }
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/UserEnvelope' } } }

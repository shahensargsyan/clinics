  /patients/{id}/summary:
    parameters: [ { $ref: '#/components/parameters/PatientId' } ]
    get:
      operationId: getPatientSummary
      tags: [Clinical]
      summary: Aggregate of every clinical sub-record for one patient.
      description: |
        Replaces the Laravel `OrthodonticsMedicalHistoryCrudController` aggregator.
        Fetches in a single request the patient's general medical history, the
        primary orthodontic record, all cephalometric analyses, the diagnostic
        assets flags, recent mechanotherapy visits, and tooth measurements.
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/PatientSummary' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

